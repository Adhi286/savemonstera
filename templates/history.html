<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveMonstera - History</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('/');
        }
    </script>
</head>
<body>
    <div id="spinner-overlay"><div class="spinner"></div></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/static/img/custom_logo.jpg" alt="Logo" class="sidebar-logo">
                <h3 style="font-size: 1.1rem; font-weight: 700;">SaveMonstera</h3>
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard">📊 Dashboard</a></li>
                <li><a href="/add_expense">➕ Add Expense</a></li>
                <li><a href="/history" class="active">📜 History</a></li>
                <li><a href="/settings">⚙️ Settings</a></li>
            </ul>
            <div class="logout-container" style="padding: 20px;">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header-flex">
                <h2>Expense History</h2>
                <div style="display: flex; gap: 10px;">
                    <a href="/api/export/csv" target="_blank" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.9rem;">Export CSV</a>
                    <a href="/api/export/pdf" target="_blank" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.9rem;">Export PDF</a>
                </div>
            </div>
            
            <div class="card">
                <div class="filters-bar">
                    <select id="filterCategory" class="form-control" onchange="loadHistory()">
                        <option value="">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Education">Education</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                    
                    <select id="filterStatus" class="form-control" onchange="loadHistory()">
                        <option value="">All Statuses</option>
                        <option value="approved">Approved</option>
                        <option value="flagged">Flagged</option>
                        <option value="pending">Pending</option>
                    </select>
                    
                    <input type="month" id="filterMonth" class="form-control" onchange="loadHistory()">
                </div>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast"></div>
    <script src="/static/js/app.js"></script>
    <script>
        async function loadHistory() {
            const cat = document.getElementById('filterCategory').value;
            const stat = document.getElementById('filterStatus').value;
            const month = document.getElementById('filterMonth').value;
            
            let url = '/api/expenses?';
            if (cat) url += `category=${cat}&`;
            if (stat) url += `status=${stat}&`;
            if (month) url += `month=${month}&`;
            
            try {
                showSpinner();
                const data = await apiFetch(url);
                const tbody = document.getElementById('historyTable');
                tbody.innerHTML = '';
                
                const formatDate = (dateStr) => {
                    if (!dateStr) return "No date";
                    const d = new Date(dateStr);
                    if (isNaN(d)) return "No date";
                    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return `${String(d.getDate()).padStart(2, '0')}-${months[d.getMonth()]}-${d.getFullYear()}`;
                };
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No records found.</td></tr>';
                } else {
                    data.forEach(exp => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${formatDate(exp.date)}</td>
                                <td>${exp.description || '-'}</td>
                                <td>${exp.category}</td>
                                <td style="font-weight: 600;">₹${exp.amount.toFixed(2)}</td>
                                <td><span class="badge badge-${exp.status.toLowerCase()}">${exp.status}</span></td>
                                <td>
                                    <button class="btn btn-outline" style="padding: 5px 10px; font-size: 0.8rem;" onclick="deleteExpense('${exp.id}')">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                }
                hideSpinner();
            } catch(e) {
                hideSpinner();
                showToast("Failed to load history", "error");
            }
        }
        
        async function deleteExpense(id) {
            if(!confirm("Are you sure you want to delete this expense?")) return;
            try {
                showSpinner();
                await apiFetch(`/api/expenses/${id}`, { method: 'DELETE' });
                hideSpinner();
                showToast("Expense deleted", "success");
                loadHistory();
            } catch(e) {
                hideSpinner();
                showToast("Failed to delete", "error");
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
